site_name: EzSCIM
site_description: SCIM 2.0 server implementation for ASP.NET Core
site_url: https://miiitch.github.io/EzSCIM
repo_url: https://github.com/miiitch/EzSCIM
repo_name: miiitch/EzSCIM
edit_uri: edit/master/docs/public/
copyright: Copyright &copy; 2024 – 2026 miiitch

docs_dir: docs/public

theme:
  name: material
  logo: EzSCIM.png
  favicon: EzSCIM.png
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips

nav:
  - Home: README.md
  - Getting Started:
    - IQueryable model: iqueryable/getting-started.md
    - EF Core model: efcore/getting-started.md
  - Reference:
    - IQueryable:
      - Repository interface: iqueryable/repository.md
      - SCIM filter syntax: iqueryable/filtering.md
      - Schema extensions: iqueryable/schema-extensions.md
      - SCIM 2.0 attribute reference: iqueryable/scim-attributes.md
    - EF Core:
      - IScimEntity interface: efcore/iscimentity.md
      - EfScimRepositoryBase reference: efcore/efrepositorybase.md
      - Multi-provider setup: efcore/multi-provider.md
  - Authentication: authentication.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
