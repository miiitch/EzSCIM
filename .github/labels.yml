# Labels for EzSCIM repository
# Apply with: gh label create --repo miiitch/EzSCIM --name "..." --color "..." --description "..."

labels:
  - name: bug
    color: "d73a4a"
    description: Something isn't working
  - name: enhancement
    color: "0075ca"
    description: New feature or request
  - name: documentation
    color: "0e8a16"
    description: Improvements to documentation
  - name: breaking-change
    color: "e4e669"
    description: Introduces a breaking API change
  - name: nuget
    color: "7057ff"
    description: Related to NuGet packaging or publishing
  - name: good first issue
    color: "7fc97f"
    description: Good for newcomers
  - name: help wanted
    color: "008672"
    description: Extra attention is needed
  - name: question
    color: "d876e3"
    description: Further information is requested
  - name: dependencies
    color: "ededed"
    description: Dependency updates
  - name: wontfix
    color: "ffffff"
    description: This will not be worked on
